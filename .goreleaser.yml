version: 2

project_name: cinnamon

before:
  hooks:
    - go mod tidy

builds:
  - id: cinnamon-macos
    main: .
    binary: cinnamon
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: cinnamon-archive
    builds:
      - cinnamon-macos
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^style:'
      - Merge pull request
      - Merge branch

brews:
  - name: cinnamon
    repository:
      owner: uraniumdawn
      name: homebrew-cinnamon
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: uraniumdawn
      email: sirozhaua@gmail.com
    homepage: https://github.com/uraniumdawn/cinnamon
    description: "Terminal UI for Apache Kafka"
    license: MIT
    dependencies:
      - name: librdkafka
    install: |
      bin.install "cinnamon"
    test: |
      system "#{bin}/cinnamon", "--version"

